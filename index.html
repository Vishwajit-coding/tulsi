<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 💛</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        padding: 20px;
    }

    .card {
        width: 100%;
        max-width: 350px;
        background: rgba(255, 255, 255, 0.9);
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    h1 {
        font-size: 1.8rem;
        color: #333;
        margin-bottom: 10px;
    }

    p {
        color: #555;
        font-size: 1rem;
    }

    .buttons {
        margin-top: 20px;
        position: relative;
    }

    button {
        padding: 12px 20px;
        margin: 10px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        width: 120px;
    }

    .yes {
        background: #28a745;
        color: white;
    }

    .no {
        background: #dc3545;
        color: white;
        position: absolute;
    }

    #response {
        margin-top: 20px;
        font-size: 1.1rem;
        color: #222;
    }
</style>

</head>
<body>

<div class="card">
    <h1>I'm Really Sorry 😔</h1>
    <p>Dhokhla… are you still naraz?</p>

    <div class="buttons">
        <button class="yes" onclick="yesClick()">No 😊</button>
        <button class="no" id="noBtn">Yes 😡</button>
    </div>

    <div id="response"></div>
</div>

<script>
    function yesClick() {
        document.getElementById("response").innerText =
            "Yay! ❤️ Let's talk, I missed you 🥺";
    }

    const noBtn = document.getElementById("noBtn");

    // MOBILE FIX: use touchstart instead of mouseover
    noBtn.addEventListener("touchstart", moveButton);
    noBtn.addEventListener("click", moveButton);

    function moveButton() {
        const card = document.querySelector(".card");
        const rect = card.getBoundingClientRect();

        const x = Math.random() * (rect.width - 100);
        const y = Math.random() * (rect.height - 50);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }
</script>

</body>
</html>
