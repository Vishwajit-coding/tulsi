<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 💛</title>

<style>
    body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    }
    body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;

    background-image: url('photo.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    }


    .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
    }

   .card {
    background: 
        linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)),
        url('photo.jpg');

    background-size: cover;
    background-position: center;

    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border-radius: 25px;
    padding: 25px;
    }
    .card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;

    border-radius: 20px;
    margin-bottom: 10px;

    filter: brightness(0.8);
    }

    h1 {
        font-size: 22px;
        color: #222;
    }

    p {
        font-size: 15px;
        color: #555;
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 10px;
        position: relative;
    }

    button {
        width: 120px;
        padding: 12px;
        border-radius: 30px;
        border: none;
        font-size: 15px;
    }

    .yes {
        background: #28a745;
        color: white;
    }

    .no {
        background: #dc3545;
        color: white;
        position: absolute;
    }

    #response {
        margin-top: 20px;
        font-size: 15px;
        color: #222;
    }
</style>
</head>

<body>

<div class="overlay"></div>
    
<div class="card">
    <img src="photo.jpg" class="card-img">

    <h1>I'm Really Sorry 😔</h1>
    <p>Dhokhla… are you still naraz?</p>

    <div class="buttons">
        <button class="yes">No 😊</button>
        <button class="no">Yes 😡</button>
    </div>
</div>

<script>
    function yesClick() {
        document.getElementById("response").innerText =
            "Yay ❤️ Let's talk, I really missed you 🥺";
    }

    const noBtn = document.getElementById("noBtn");

    // MOBILE TOUCH SUPPORT
    noBtn.addEventListener("touchstart", moveButton);
    noBtn.addEventListener("click", moveButton);

    function moveButton() {
        const maxX = 150;
        const maxY = 40;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }
</script>

</body>
</html>
