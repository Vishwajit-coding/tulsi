<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 💛</title>

<style>
    body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;

    background-image: url('photo.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* REMOVE overlay + body::before COMPLETELY */

.card {
    width: 90%;
    max-width: 340px;

    padding: 20px;
    border-radius: 25px;

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;

    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 15px;
}

h1 {
    color: white;
    font-size: 22px;
    margin: 0;
}

p {
    color: #ddd;
    font-size: 16px;
    margin: 0;
}

.buttons {
    display: flex;
    gap: 12px;
    margin-top: 10px;
}

button {
    width: 120px;
    padding: 12px;
    border-radius: 30px;
    border: none;
    font-size: 15px;
    color: white;
    cursor: pointer;
}

.yes {
    background: #28a745;
}

.no {
    background: #dc3545;
    /* REMOVE position:absolute */
}
    
</style>
</head>

<body>

<div class="overlay"></div>
    
<div class="card">

    <!-- IMAGE -->
    <img src="photo.jpg" class="card-img">

    <!-- TEXT -->
    <h1>I'm Really Sorry 😔</h1>
    <p>Dhokhla… are you still naraz?</p>

    <!-- BUTTONS -->
    <div class="buttons">
        <button class="yes" onclick="yesClick()">No 😊</button>
        <button class="no" id="noBtn">Yes 😡</button>
    </div>

    <!-- RESPONSE -->
    <div id="response"></div>

</div>

<script>
    function yesClick() {
    document.getElementById("response").innerText =
        "Yay ❤️ Let's talk, I really missed you 🥺";
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function moveButton() {
    const x = Math.random() * 100 - 50;
    const y = Math.random() * 50;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
}
</script>

</body>
</html>
